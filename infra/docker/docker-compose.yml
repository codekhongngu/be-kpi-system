# Development configuration - runs with hotreload
# Both dev and prod share the same DB service (same volume and network)

services:
  # Shared PostgreSQL database (used by both dev and prod)
  # Note: If DB is already running from prod, this will use the same volume
  postgres:
    image: postgres:16-alpine
    container_name: db-csdl-tuyphuoc
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-db_commune_tuyphuoc}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - starter-be-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Development app - runs with hotreload
  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.dev
    container_name: be-csdl-tuyphuoc-dev
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-db_commune_tuyphuoc}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      DB_LOGGING: ${DB_LOGGING:-true}
    volumes:
      # Mount source code for hot-reload
      - ../..:/app
      # Exclude node_modules to use container's node_modules
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - starter-be-network

volumes:
  postgres_data:

networks:
  starter-be-network:
    driver: bridge

