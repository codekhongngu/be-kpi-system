# Prometheus configuration for monitoring NestJS application

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'starter-be-monitor'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Load rules once and periodically evaluate them
rule_files:
  # - "alert_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # NestJS application metrics
  - job_name: 'nestjs-app'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['app:5000']
        labels:
          environment: 'production'
          service: 'starter-be'

  # PostgreSQL exporter (if enabled)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis exporter (if enabled)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
